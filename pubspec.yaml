name: pokedex_app
description: "A Pokedex Flutter app with clean architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  google_fonts: ^8.0.2

  # Networking
  dio: ^5.8.0+1
  retrofit: ^4.4.1

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  hooks_riverpod: ^3.1.0
  flutter_hooks: ^0.21.2

  # Code Generation — Freezed (models + unions)
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  freezed: ^3.2.3
  json_serializable: ^6.9.4
  riverpod_generator: ^4.0.0+1
  retrofit_generator: ^10.2.1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0
  flutter_native_splash: ^2.4.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_native_splash:
  color: "#ffffff"
  fullscreen: true

